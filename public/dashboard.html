<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoramento HAG</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>💧 Monitoramento HAG</h1>

<div id="statusSistema">
🟢 Tempo real conectado
<br>
Atualizado: <span id="hora">--:--</span>
</div>

</header>

<main>

<!-- =========================
RESERVATÓRIOS
========================= -->

<section id="areaReservatorios" class="grid-reservatorios">
<!-- JS VAI PREENCHER AQUI -->
</section>


<!-- =========================
BOMBAS
========================= -->

<section id="areaBombas" class="grid-bombas">
<!-- JS VAI PREENCHER AQUI -->
</section>


<!-- =========================
PRESSÕES
========================= -->

<section id="areaPressoes" class="grid-pressoes">
<!-- JS VAI PREENCHER AQUI -->
</section>

</main>

<footer>
Sistema Profissional - HAG
</footer>

<!-- =========================
⏰ RELÓGIO (CORRIGIDO)
========================= -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  function atualizarHora(){
    const el = document.getElementById("hora");
    if(el){
      el.innerText = new Date().toLocaleTimeString("pt-BR");
    }
  }

  atualizarHora(); // executa imediato
  setInterval(atualizarHora,1000);

});
</script>

<!-- =========================
📡 DASHBOARD
========================= -->
<script src="dashboard.js"></script>

</body>
</html>
