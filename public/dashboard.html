<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoramento - HAG</title>

<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- JS -->
<script defer src="dashboard.js"></script>
</head>

<body>

<header>
  <h1>Hospital Arnaldo Gavazza – Monitoramento</h1>
  <div id="lastUpdate">Atualizado --:--:--</div>
</header>

<!-- STATUS SISTEMA -->
<div id="statusSistema">🟢 Sistema Operacional</div>

<main>

  <!-- =========================
       TOPO - RESERVATÓRIOS
  ========================== -->
  <section class="area-topo">
    <div id="reservatoriosContainer"></div>
  </section>

  <!-- =========================
       BAIXO
  ========================== -->
  <section class="area-bottom">

    <!-- GRÁFICO -->
    <div id="graficoUTI">
      <canvas id="graficoUTIChart"></canvas>
      <div id="previsaoIA">Coletando dados...</div>
    </div>

    <!-- PRESSÃO + BOMBAS -->
    <div id="pressaoBombaGrid">

      <!-- PRESSÕES -->
      <div class="card-pressao">
        <h3>Saída Osmose</h3>
        <span id="pSaidaOsmose">--</span>
      </div>

      <div class="card-pressao">
        <h3>Retorno Osmose</h3>
        <span id="pRetornoOsmose">--</span>
      </div>

      <div class="card-pressao">
        <h3>Saída CME</h3>
        <span id="pSaidaCME">--</span>
      </div>

      <!-- BOMBAS -->
      <div class="card-bomba" id="bomba1">
        <h3>Bomba 01</h3>
        <p id="b1Status">--</p>
        <p id="b1Ciclos">--</p>
      </div>

      <div class="card-bomba" id="bomba2">
        <h3>Bomba 02</h3>
        <p id="b2Status">--</p>
        <p id="b2Ciclos">--</p>
      </div>

      <div class="card-bomba" id="bomba3">
        <h3>Bomba Osmose</h3>
        <p id="b3Status">--</p>
        <p id="b3Ciclos">--</p>
      </div>

    </div>

  </section>

</main>

<footer>
  Sistema HAG © 2025
</footer>

</body>
</html>
