<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoramento HAG</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="header-top">

<h1>💧 Monitoramento HAG</h1>

<button class="btn-historico">
📊 Histórico
</button>

</div>

<div id="statusSistema">
🟢 Tempo real conectado
</div>

<div class="header-info">

<div>
📅 <span id="dataSistema"></span>
</div>

<div>
⏰ <span id="hora">--:--</span>
</div>

</div>

<!-- KPIs -->

<div class="kpis">

<div class="kpi">
Consumo Hoje
<span id="kpiConsumo">0 L</span>
</div>

<div class="kpi">
Bombas Ativas
<span id="kpiBombas">0</span>
</div>

<div class="kpi">
Reservatórios Críticos
<span id="kpiCritico">0</span>
</div>

</div>

</header>

<main>

<!-- =========================
RESERVATÓRIOS
========================= -->

<section>

<h2 class="titulo-area">
Reservatórios
</h2>

<section id="areaReservatorios" class="grid-reservatorios">
<!-- JS PREENCHE -->
</section>

</section>


<!-- =========================
BOMBAS
========================= -->

<section>

<h2 class="titulo-area">
Bombas
</h2>

<section id="areaBombas" class="grid-bombas">
<!-- JS PREENCHE -->
</section>

</section>


<!-- =========================
PRESSÕES
========================= -->

<section>

<h2 class="titulo-area">
Pressões
</h2>

<section id="areaPressoes" class="grid-pressoes">
<!-- JS PREENCHE -->
</section>

</section>

</main>

<footer>
Sistema Profissional - HAG
</footer>

<!-- =========================
⏰ RELÓGIO + DATA
========================= -->

<script>

document.addEventListener("DOMContentLoaded", () => {

function atualizarHora(){

const agora = new Date()

const hora = document.getElementById("hora")
const data = document.getElementById("dataSistema")

if(hora){
hora.innerText = agora.toLocaleTimeString("pt-BR")
}

if(data){
data.innerText = agora.toLocaleDateString("pt-BR")
}

}

atualizarHora()
setInterval(atualizarHora,1000)

})

</script>

<!-- =========================
📡 DASHBOARD
========================= -->

<script src="dashboard.js"></script>

</body>
</html>
