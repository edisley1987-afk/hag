<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento HAG - Profissional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="main-header">
    <div class="header-top">
        <h1>💧 Monitoramento HAG</h1>
        <div class="status-indicator">
            <span class="pulse-dot"></span> Tempo real conectado
        </div>
    </div>
</header>

<main class="dashboard-container">
    
    <section class="kpi-grid">
        <div class="kpi-card"><span>Elevador</span><strong id="kpiElevador">0 L</strong></div>
        <div class="kpi-card"><span>Lavanderia</span><strong id="kpiLavanderia">0 L</strong></div>
        <div class="kpi-card"><span>Osmose</span><strong id="kpiOsmose">0 L</strong></div>
    </section>

    <section>
        <h2>Reservatórios</h2>
        <div id="areaReservatorios" class="grid-content">
            </div>
    </section>

    <section>
        <h2>Bombas</h2>
        <div id="areaBombas" class="grid-content">
            </div>
    </section>

</main>

<script src="/dashboard.js"></script>
</body>
</html>
