<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoramento HAG</title> 

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<!-- =========================
TOPO
========================= -->
<div class="cabecalho">

<h1>💧 Monitoramento HAG</h1>

<div class="subtitulo">
Sistema de Monitoramento de Reservatórios
</div>

<div class="status" id="statusTempoReal">
<span class="status-dot"></span>
<span id="statusTexto">Tempo real conectado</span> • 
<span id="hora">--:--</span>
</div>

<a href="historico.html" class="btn-historico">
📊 Histórico
</a>

</div>

<!-- =========================
STATUS SISTEMA (JS CONTROLA)
========================= -->
<div id="statusSistema">
🟢 Tempo real conectado
</div>

<!-- =========================
DATA
========================= -->
<div class="header-info">

<div>
📅 <span id="dataSistema">--/--/----</span>
</div>

</div>

<!-- =========================
KPIs
========================= -->
<div class="kpis">

<div class="kpi">
Elevador Hoje
<span id="kpiElevador">0 L</span>
</div>

<div class="kpi">
Lavanderia Hoje
<span id="kpiLavanderia">0 L</span>
</div>

<div class="kpi">
Osmose Hoje
<span id="kpiOsmose">0 L</span>
</div>

<div class="kpi">
Bombas Ativas
<span id="bombasAtivas">0</span>
</div>

<div class="kpi">
Reservatórios Críticos
<span id="kpiCritico">0</span>
</div>

</div>

</header>


<main>

<!-- =========================
RESERVATÓRIOS
========================= -->
<section>

<h2 class="titulo-area">Reservatórios</h2>

<div id="areaReservatorios" class="grid-reservatorios">
<!-- JS PREENCHE -->
</div>

</section>


<!-- =========================
BOMBAS
========================= -->
<section>

<h2 class="titulo-area">Bombas</h2>

<div id="areaBombas" class="grid-bombas">
<!-- JS PREENCHE -->
</div>

</section>


<!-- =========================
PRESSÕES
========================= -->
<section>

<h2 class="titulo-area">Pressões</h2>

<div id="areaPressoes" class="grid-pressoes">
<!-- JS PREENCHE -->
</div>

</section>

</main>


<footer>
Sistema Profissional - HAG
</footer>


<!-- =========================
📡 DASHBOARD JS
========================= -->
<script src="/dashboard.js"></script>

<!-- =========================
🧠 SCRIPTS AUXILIARES (LEVE)
========================= -->
<script>
// log inicial
console.log("🔥 Dashboard carregado");

// =======================
// DATA ATUAL
// =======================
function atualizarData() {
    const el = document.getElementById("dataSistema");
    if (!el) return;

    const agora = new Date();

    el.innerText = agora.toLocaleDateString("pt-BR");
}

setInterval(atualizarData, 1000);
atualizarData();

// =======================
// HORA LOCAL (fallback)
// =======================
function atualizarHoraLocal() {
    const el = document.getElementById("hora");
    if (!el) return;

    const agora = new Date();
    el.innerText = agora.toLocaleTimeString("pt-BR");
}

// só usa se backend não atualizar
setInterval(atualizarHoraLocal, 1000);

// =======================
// STATUS VISUAL (LED)
// =======================
function atualizarStatusVisual(texto) {
    const el = document.getElementById("statusTexto");
    const dot = document.querySelector(".status-dot");

    if (!el || !dot) return;

    el.innerText = texto;

    if (texto.includes("Tempo real")) {
        dot.style.background = "#00ff88";
    } else if (texto.includes("Reconectando")) {
        dot.style.background = "#ffd600";
    } else {
        dot.style.background = "#ff3d00";
    }
}

// OBS: seu JS principal já controla #statusSistema,
// aqui é só visual do topo se quiser integrar depois

</script>

</body>
</html>
