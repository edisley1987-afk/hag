<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAG SCADA - Dashboard Profissional</title>
    <style>
        /* ==========================================================
           CSS COMPLETO - COPIE TODO ESTE BLOCO
           ========================================================== */
        :root {
            --bg-dark: #0f172a;
            --sidebar-bg: rgba(15, 23, 42, 0.98);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --neon-cyan: #00e5ff;
            --neon-blue: #0077ff;
            --neon-green: #00ff88;
            --text-white: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR RETRÁTIL */
        .sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: 70px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--glass-border);
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .sidebar:hover { width: 240px; box-shadow: 15px 0 40px rgba(0, 0, 0, 0.6); }

        .logo-area { padding: 25px; display: flex; align-items: center; gap: 20px; white-space: nowrap; }

        .sidebar ul { list-style: none; padding: 0; margin: 20px 0; }
        .sidebar ul li {
            padding: 18px 25px; display: flex; align-items: center; gap: 20px;
            cursor: pointer; white-space: nowrap; transition: 0.3s; color: rgba(255,255,255,0.6);
        }
        .sidebar ul li:hover { color: var(--neon-cyan); background: rgba(255,255,255,0.05); }

        /* CONTEÚDO */
        .main-content {
            flex: 1;
            margin-left: 70px;
            padding: 40px;
            background: radial-gradient(circle at 70% 20%, #1e293b, #0f172a);
        }

        .top-bar { display: flex; justify-content: space-between; margin-bottom: 40px; }

        /* CARDS E TANQUES */
        .grid-reservatorios { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 25px; }

        .card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(5px);
            text-align: center;
        }

        .tanque {
            position: relative;
            width: 130px; height: 200px;
            margin: 15px auto;
            background: var(--glass-bg);
            border: 2px solid rgba(0, 229, 255, 0.2);
            border-radius: 60px; /* Estilo cápsula */
            overflow: hidden;
        }

        .agua {
            position: absolute; bottom: 0; width: 100%;
            background: linear-gradient(180deg, var(--neon-cyan) 0%, var(--neon-blue) 100%);
            box-shadow: 0 -10px 25px rgba(0, 229, 255, 0.5);
            transition: height 1s ease-in-out;
            border-radius: 0 0 60px 60px;
        }

        .label-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; }
        .label-percent { font-size: 28px; font-weight: 900; }

        /* BOMBAS E PRESSÃO */
        .bomba-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .pressao-col { display: flex; flex-direction: column; gap: 15px; }

    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo-area">
            <span style="font-size: 24px;">💧</span>
            <span style="font-weight: bold; font-size: 18px;">HAG SCADA</span>
        </div>
        <ul>
            <li class="active"><span>📊</span> <span>Dashboard</span></li>
            <li><span>📈</span> <span>Gráficos</span></li>
            <li><span>⚠️</span> <span>Alertas</span></li>
            <li><span>⚙️</span> <span>Configurações</span></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <div>
                <h1 style="margin:0">MONITORAMENTO DE CAIXA D'ÁGUA</h1>
                <p style="opacity:0.5">Hospital Arnaldo Gavazza | Unidade Industrial</p>
            </div>
            <div id="relogio" style="font-size: 24px; font-weight: bold;">00:00:00</div>
        </header>

        <h3 style="color: var(--neon-cyan)">RESERVATÓRIOS</h3>
        <section id="areaReservatorios" class="grid-reservatorios"></section>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 30px; margin-top: 40px;">
            <div>
                <h3 style="color: var(--neon-cyan)">ESTADO DAS BOMBAS</h3>
                <div id="areaBombas" class="bomba-grid"></div>
            </div>
            <div>
                <h3 style="color: var(--neon-cyan)">SENSORES DE PRESSÃO</h3>
                <div id="areaPressao" class="pressao-col"></div>
            </div>
        </div>
    </main>

    <script>
        // Dados para teste (Substitua pelos dados do seu WebSocket)
        const dados = {
            reservatorios: [
                { nome: "Elevador", percent: 83, litros: 16659 },
                { nome: "Osmose", percent: 94, litros: 188 },
                { nome: "Cme", percent: 100, litros: 1000 },
                { nome: "Abrandada", percent: 94, litros: 8423 },
                { nome: "Lavanderia", percent: 90, litros: 9033 }
            ],
            bombas: [
                { nome: "Bomba 01", estado: "Inativa", cor: "#ff3d00", icon: "🛑" },
                { nome: "Bomba 02", estado: "Em Operação", cor: "#00ff88", icon: "⚙️" }
            ],
            pressao: [
                { nome: "Saída Osmose", valor: 3.67 },
                { nome: "Retorno Osmose", valor: 1.56 },
                { nome: "Saída CME", valor: 0.51 }
            ]
        };

        function render() {
            // Render Tanques
            document.getElementById("areaReservatorios").innerHTML = dados.reservatorios.map(r => `
                <div class="card">
                    <h2 style="font-size: 14px; opacity:0.7">${r.nome}</h2>
                    <div class="tanque">
                        <div class="label-container">
                            <div class="label-percent">${r.percent}%</div>
                            <div style="font-size:10px; opacity:0.6">${r.litros} L</div>
                        </div>
                        <div class="agua" style="height: ${r.percent}%"></div>
                    </div>
                </div>
            `).join('');

            // Render Bombas
            document.getElementById("areaBombas").innerHTML = dados.bombas.map(b => `
                <div class="card">
                    <div style="font-size: 30px">${b.icon}</div>
                    <div style="color: ${b.cor}; font-weight: bold; margin: 10px 0;">${b.estado}</div>
                    <div style="font-size: 12px; opacity:0.5">${b.nome}</div>
                </div>
            `).join('');

            // Render Pressão
            document.getElementById("areaPressao").innerHTML = dados.pressao.map(p => `
                <div class="card" style="display:flex; justify-content: space-between; align-items: center; padding: 15px">
                    <span style="font-size: 12px; opacity:0.7">${p.nome}</span>
                    <span style="color: var(--neon-cyan); font-weight: bold;">${p.valor} bar</span>
                </div>
            `).join('');
        }

        setInterval(() => { document.getElementById("relogio").innerText = new Date().toLocaleTimeString(); }, 1000);
        render();
    </script>
</body>
</html>
