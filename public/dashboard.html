<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoramento HAG</title> 
<link rel="stylesheet" href="style.css">
</head>

<body>
<header>
<div class="cabecalho">
<h1>💧 Monitoramento HAG</h1>
<div class="subtitulo">Sistema de Monitoramento de Reservatórios</div>
<div class="status" id="statusTempoReal">
    <span class="status-dot"></span>
    <span id="statusTexto">Tempo real conectado</span> • 
    <span id="hora">--:--</span>
</div>
<a href="historico.html" class="btn-historico">📊 Histórico</a>
</div>

<div id="statusSistema">🟢 Tempo real conectado</div>

<div class="header-info">
    <div>📅 <span id="dataSistema">--/--/----</span></div>
</div>

<div class="kpis-container">
<div class="kpis">
<div class="kpi">
<span>Elevador Hoje</span>
<strong id="kpiElevador">0 L</strong>
</div>
<div class="kpi">
<span>Lavanderia Hoje</span>
<strong id="kpiLavanderia">0 L</strong>
</div>
<div class="kpi">
<span>Osmose Hoje</span>
<strong id="kpiOsmose">0 L</strong>
</div>
<div class="kpi">
<span>Bombas Ativas</span>
<strong id="bombasAtivas">0</strong>
</div>
<div class="kpi">
<span>Reservatórios Críticos</span>
<strong id="kpiCritico">0</strong>
</div>
</div>
</div>
</header>

<main>
<section>
<h2 class="titulo-area">Reservatórios</h2>
<div id="areaReservatorios" class="grid-reservatorios"></div>
</section>

<section>
<h2 class="titulo-area">Bombas</h2>
<div id="areaBombas" class="grid-bombas"></div>
</section>

<section>
<h2 class="titulo-area">Pressões</h2>
<div id="areaPressoes" class="grid-pressoes"></div>
</section>
</main>

<footer>Sistema Profissional - HAG</footer>

<script src="/dashboard.js"></script>
<script>
console.log("🔥 Dashboard carregado");

function atualizarData() {
    const el = document.getElementById("dataSistema");
    if (!el) return;
    const agora = new Date();
    el.innerText = agora.toLocaleDateString("pt-BR");
}
setInterval(atualizarData, 1000);
atualizarData();

function atualizarHoraLocal() {
    const el = document.getElementById("hora");
    if (!el) return;
    const agora = new Date();
    el.innerText = agora.toLocaleTimeString("pt-BR");
}
setInterval(atualizarHoraLocal, 1000);

function atualizarStatusVisual(texto) {
    const el = document.getElementById("statusTexto");
    const dot = document.querySelector(".status-dot");
    if (!el || !dot) return;
    el.innerText = texto;
    if (texto.includes("Tempo real")) dot.style.background = "#00ff88";
    else if (texto.includes("Reconectando")) dot.style.background = "#ffd600";
    else dot.style.background = "#ff3d00";
}
</script>
</body>
</html>
