<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoramento HAG</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: #e2e8f0;
    padding: 20px;
    min-height: 100vh;
  }
.header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 30px; padding: 20px; background: rgba(30, 41, 59, 0.8);
    border-radius: 12px; border: 1px solid rgba(148, 163, 184, 0.2);
  }
.header h1 { font-size: 24px; color: #60a5fa; }
.status { display: flex; align-items: center; gap: 10px; font-size: 14px; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; background: #00ff88; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
.kpi-card {
    background: rgba(30, 41, 59, 0.8); padding: 15px; border-radius: 10px;
    border: 1px solid rgba(148, 163, 184, 0.2); text-align: center;
  }
.kpi-card h3 { font-size: 12px; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; }
.kpi-card.value { font-size: 28px; font-weight: bold; color: #60a5fa; }

.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }

.card {
    background: rgba(30, 41, 59, 0.8); padding: 20px; border-radius: 12px;
    border: 1px solid rgba(148, 163, 184, 0.2); transition: all 0.3s;
  }
.card:hover { border-color: #60a5fa; box-shadow: 0 8px 20px rgba(96, 165, 250, 0.2); }
.card h2 { font-size: 16px; margin-bottom: 15px; color: #cbd5e1; }

.valor-pressao { font-size: 28px; font-weight: bold; color: #60a5fa; text-align: center; margin: 20px 0; }

.chart-container { background: rgba(30, 41, 59, 0.8); padding: 20px; border-radius: 12px; border: 1px solid rgba(148, 163, 184, 0.2); }
  canvas { max-height: 300px; }

  body.sem-sinal { opacity: 0.7; }

/* ==========================================================
   RESERVATÓRIOS 3D PROFISSIONAL - PADRÃO INDUSTRIAL
   ========================================================== */
.grid-reservatorios {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 40px;
  margin-bottom: 50px;
}

/* Card plano para legibilidade em painel 24/7 */
.card.reservatorio {
  background: linear-gradient(135deg, rgba(15, 35, 60, 0.85) 0%, rgba(8, 20, 35, 0.95) 100%);
  border-radius: 18px;
  padding: 28px 24px 32px;
  border: 1px solid rgba(0, 229, 255, 0.15);
  box-shadow:
    0 20px 45px rgba(0,0,0,0.6),
    0 8px 20px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
  position: relative;
  overflow: hidden;
  text-align: center;
}

/* Linha de brilho superior no card */
.card.reservatorio::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.5), transparent);
}

.card.reservatorio:hover {
  transform: translateY(-10px);
  border-color: rgba(0, 229, 255, 0.4);
  box-shadow:
    0 30px 60px rgba(0,0,0,0.7),
    0 15px 35px rgba(0, 229, 255, 0.25),
    inset 0 1px 0 rgba(255,255,255,0.1);
}

.card.reservatorio.alerta {
  border-color: #ff3d00;
  box-shadow:
    0 20px 45px rgba(255, 61, 0, 0.4),
    0 8px 20px rgba(255, 61, 0, 0.2),
    inset 0 1px 0 rgba(255,255,255,0.05);
  animation: alerta-pulse 2s infinite;
}

@keyframes alerta-pulse {
 0%, 100% { box-shadow: 0 20px 45px rgba(255, 61, 0, 0.4), 0 8px 20px rgba(255, 61, 0, 0.2); }
 50% { box-shadow: 0 25px 55px rgba(255, 61, 0, 0.6), 0 12px 30px rgba(255, 61, 0, 0.4); }
}

.card.reservatorio h2 {
  color: #e0f7ff;
  font-size: 18px;
  margin: 0 0 22px 0;
  text-align: center;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.9);
}

/* ================== TANQUE CILÍNDRICO METÁLICO ================== */
.tanque {
  position: relative;
  width: 170px;
  height: 230px;
  margin: 25px auto;
  background: linear-gradient(90deg,
      #0a1a2a 0%,
      #1a3a5a 25%,
      #2d5f8a 50%,
      #1a3a5a 75%,
      #0a1a2a 100%);
  border-radius: 0 0 60px 60px;
  border: 2px solid rgba(120, 180, 220, 0.3);
  box-shadow:
    inset -25px 0 50px rgba(0,0,0,0.8),
    inset 25px 0 50px rgba(255,255,255,0.06),
    inset 0 -40px 60px rgba(0,0,0,0.85);
  overflow: hidden;
  display: flex;
  align-items: flex-end;
}

/* Tampa superior com relevo metálico */
.tanque::before {
  content: "";
  position: absolute;
  top: -18px;
  left: -4px;
  width: calc(100% + 8px);
  height: 36px;
  background: radial-gradient(ellipse at center, #5a8bb8 0%, #2a4a66 60%, #112d47 100%);
  border-radius: 50%;
  border: 3px solid #6a9cc8;
  box-shadow:
    0 -6px 18px rgba(0,0,0,0.9),
    inset 0 4px 8px rgba(255,255,255,0.25),
    inset 0 -2px 4px rgba(0,0,0,0.5);
  z-index: 10;
}

/* Reflexo de vidro na parede interna */
.tanque::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(95deg,
    rgba(255,255,255,0.15) 0%,
    transparent 25%,
    transparent 70%,
    rgba(255,255,255,0.08) 100%);
  pointer-events: none;
  z-index: 6;
  border-radius: 0 0 60px 60px;
}

/* Escala de nível lateral */
.escala {
  position: absolute;
  right: -52px;
  top: 20px;
  height: 78%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  color: #7aa8cc;
  font-size: 11px;
  font-weight: 700;
  text-shadow: 2px 2px 5px rgba(0,0,0,0.95);
  z-index: 8;
  letter-spacing: 0.5px;
}

.escala span {
  position: relative;
  padding-right: 8px;
}

.escala span::before {
  content: "";
  position: absolute;
  right: 0;
  top: 50%;
  width: 15px;
  height: 1px;
  background: linear-gradient(90deg, #4a7fa8, transparent);
  transform: translateY(-50%);
}

/* ================== ÁGUA COM FÍSICA REAL ================== */
.agua {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 0%;
  border-radius: 0 0 55px 55px;
  transition: height 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  z-index: 1;
  overflow: hidden;
  background: linear-gradient(to top,
    #003d7a 0%,
    #0066cc 30%,
    #0099ff 60%,
    #40c4ff 85%,
    #80d8ff 100%);
  box-shadow:
    inset 0 -25px 50px rgba(0,40,100,0.7),
    inset 0 10px 20px rgba(255,255,255,0.2);
}

/* Menisco - curvatura da superfície da água */
.agua::before {
  content: "";
  position: absolute;
  top: 0;
  left: 5%;
  width: 90%;
  height: 8px;
  background: radial-gradient(ellipse at center,
    rgba(255,255,255,0.5) 0%,
    rgba(255,255,255,0.2) 40%,
    transparent 70%);
  border-radius: 50%;
  transform: translateY(-50%);
  filter: blur(1.5px);
  z-index: 3;
}

/* Reflexo lateral da água na parede */
.agua::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 35%;
  height: 100%;
  background: linear-gradient(90deg,
    rgba(255,255,255,0.18) 0%,
    rgba(255,255,255,0.06) 50%,
    transparent 100%);
  pointer-events: none;
  z-index: 2;
}

/* Onda suave na superfície */
.onda {
  position: absolute;
  top: -10px;
  left: -60%;
  width: 220%;
  height: 20px;
  background: radial-gradient(ellipse at center,
    rgba(255,255,255,0.28) 0%,
    rgba(255,255,255,0.1) 45%,
    transparent 70%);
  animation: onda 4s ease-in-out infinite;
  filter: blur(2px);
  z-index: 4;
}

@keyframes onda {
 0%, 100% { transform: translateX(0) scaleY(1); }
 50% { transform: translateX(30%) scaleY(1.25); }
}

/* Balanço físico quando nível muda */
.agua.balancando {
  animation: balanco 1.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

@keyframes balanco {
 0%, 100% { transform: skewX(0deg) scaleX(1); }
 25% { transform: skewX(1.8deg) scaleX(1.015); }
 75% { transform: skewX(-1.2deg) scaleX(0.985); }
}

/* ================== CORES POR NÍVEL ================== */
.agua.nivel-cheio {
  background: linear-gradient(to top, #00c853 0%, #00e676 50%, #69f0ae 85%, #b9f6ca 100%);
  box-shadow:
    inset 0 -25px 50px rgba(0,120,60,0.6),
    inset 0 10px 20px rgba(255,255,255,0.3),
    0 0 30px rgba(0,230,118,0.3);
}
.agua.nivel-alto {
  background: linear-gradient(to top, #00b0ff 0%, #40c4ff 50%, #80d8ff 85%, #b3e5fc 100%);
  box-shadow:
    inset 0 -25px 50px rgba(0,80,160,0.6),
    inset 0 10px 20px rgba(255,255,255,0.25),
    0 0 25px rgba(64,196,255,0.25);
}
.agua.nivel-medio {
  background: linear-gradient(to top, #0077ff 0%, #00ddff 50%, #64ffff 85%, #a7ffeb 100%);
  box-shadow:
    inset 0 -25px 50px rgba(0,60,120,0.6),
    inset 0 10px 20px rgba(255,255,255,0.25),
    0 0 20px rgba(0,221,255,0.2);
}
.agua.nivel-baixo {
  background: linear-gradient(to top, #ff9800 0%, #ffc107 50%, #ffd54f 85%, #ffe082 100%);
  box-shadow:
    inset 0 -25px 50px rgba(200,120,0,0.6),
    inset 0 10px 20px rgba(255,255,255,0.25),
    0 0 20px rgba(255,193,7,0.2);
}
.agua.nivel-critico {
  background: linear-gradient(to top, #d50000 0%, #ff3d00 50%, #ff6e40 85%, #ffab91 100%);
  box-shadow:
    inset 0 -25px 50px rgba(150,0,0,0.7),
    inset 0 10px 20px rgba(255,255,255,0.25),
    0 0 35px rgba(255,61,0,0.4);
  animation: pulsar-critico 1.6s infinite;
}

@keyframes pulsar-critico {
 0%, 100% { opacity: 1; transform: scale(1); }
 50% { opacity: 0.85; transform: scale(1.02); }
}

/* ================== INFO DO RESERVATÓRIO ================== */
.info {
  text-align: center;
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
}

.info.valor {
  font-size: 38px;
  font-weight: 900;
  background: linear-gradient(135deg, #00e5ff 0%, #40d4ff 50%, #80e0ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 4px 25px rgba(0,229,255,0.5);
  filter: drop-shadow(0 3px 10px rgba(0,0,0,0.8));
  line-height: 1;
}

.info.litros {
  font-size: 15px;
  color: #a8c8e8;
  margin-top: 10px;
  font-weight: 600;
  text-shadow: 1px 1px 5px rgba(0,0,0,0.9);
  letter-spacing: 0.5px;
}

/* ================== BOMBAS ================== */
.bomba.ligada.status-icon { color: #22c55e; }
.bomba.desligada.status-icon { color: #ef4444; }
.bomba.stale.status-icon { color: #64748b; }
.status-icon { font-size: 40px; text-align: center; margin: 10px 0; }
.ciclos { font-size: 12px; color: #94a3b8; text-align: center; }

/* Responsivo */
@media (max-width: 768px) {
 .tanque {
    width: 145px;
    height: 200px;
  }
 .grid-reservatorios {
    gap: 30px;
  }
}
</style>
</head>
<body>
  <div class="header">
    <h1>🏥 Monitoramento Hospital Arnaldo Gavazza</h1>
    <div class="status">
      <div class="status-dot"></div>
      <span id="statusTexto">Tempo real conectado</span>
      <span id="hora">--:--</span>
    </div>
  </div>

  <div class="kpis">
    <div class="kpi-card"><h3>Reservatórios Críticos</h3><div class="value" id="kpiCritico">0</div></div>
    <div class="kpi-card"><h3>Bombas Ativas</h3><div class="value" id="bombasAtivas">0</div></div>
    <div class="kpi-card"><h3>Consumo Elevador Hoje</h3><div class="value" id="kpiElevador">0 L</div></div>
    <div class="kpi-card"><h3>Consumo Lavanderia Hoje</h3><div class="value" id="kpiLavanderia">0 L</div></div>
    <div class="kpi-card"><h3>Consumo Osmose Hoje</h3><div class="value" id="kpiOsmose">0 L</div></div>
  </div>

  <div class="grid-reservatorios" id="areaReservatorios"></div>
  <div class="grid" id="areaBombas"></div>
  <div class="grid" id="areaPressoes"></div>

  <div class="chart-container">
    <h2>Histórico 7 Dias - Nível dos Reservatórios (%)</h2>
    <canvas id="chartHistorico"></canvas>
  </div>

<script>
const API = "/api/dashboard";
let ws = null;
let reconnectDelay = 3000;
let ultimoDado = Date.now();
let renderPending = false;
let chartHistorico = null;

init();

function init() {
    carregarHistorico();
    fallbackHTTP();
    conectarWS();
    setInterval(fallbackHTTP, 8000);

    setInterval(() => {
        if (Date.now() - ultimoDado > 15000) {
            atualizarStatusVisual("Sem sinal");
            document.body.classList.add("sem-sinal");
        } else {
            document.body.classList.remove("sem-sinal");
            atualizarStatusVisual("Tempo real conectado");
        }
    }, 5000);
}

function processarPayload(payload) {
    if (!payload) return;
    if (payload.type === "update" && payload.dados) payload = payload.dados;
    ultimoDado = Date.now();
    scheduleRender(payload);
}

function scheduleRender(data) {
    if (renderPending) return;
    renderPending = true;
    requestAnimationFrame(() => {
        atualizarUI(data);
        renderPending = false;
    });
}

function atualizarUI(data) {
    if (!data) return;
    document.getElementById("hora").innerText = data.lastUpdate || "--:--";
    renderReservatorios(data.reservatorios || []);
    renderBombas(data.bombas || []);
    renderPressoes(data.pressoes || []);
    atualizarKPIs(data);
}

function renderReservatorios(lista) {
    const area = document.getElementById("areaReservatorios");
    if (!area) return;

    lista.forEach(r => {
        const id = `res-${r.setor}`;
        let el = document.getElementById(id);

        if (!el) {
            el = document.createElement("div");
            el.id = id;
            el.className = "card reservatorio";
            el.innerHTML = `
                <h2>${r.nome}</h2>
                <div class="tanque">
                    <div class="escala"><span>100</span><span>75</span><span>50</span><span>25</span><span>0</span></div>
                    <div class="agua"><div class="onda"></div></div>
                </div>
                <div class="info">
                    <div class="valor">0%</div>
                    <div class="litros">0 L</div>
                </div>
            `;
            area.appendChild(el);
        }

        const agua = el.querySelector(".agua");
        const valor = el.querySelector(".valor");
        const litros = el.querySelector(".litros");

        const nivel = Math.min(100, Math.max(0, r.percent));
        const nivelSuavizado = Math.round(nivel);
        const nivelAnterior = Number(agua.dataset.nivel || 0);

        if (Math.abs(nivelSuavizado - nivelAnterior) >= 1) {
            agua.classList.add("balancando");
            setTimeout(() => agua.classList.remove("balancando"), 1300);
        }

        agua.style.height = `${nivelSuavizado}%`;
        agua.dataset.nivel = nivelSuavizado;
        agua.className = "agua";

        if (nivel >= 95) agua.classList.add("nivel-cheio");
        else if (nivel >= 70) agua.classList.add("nivel-alto");
        else if (nivel >= 40) agua.classList.add("nivel-medio");
        else if (nivel >= 20) agua.classList.add("nivel-baixo");
        else agua.classList.add("nivel-critico");

        if (nivel < 20) el.classList.add("alerta"); else el.classList.remove("alerta");
        valor.innerText = `${nivelSuavizado}%`;
        litros.innerText = `${formatar(r.current_liters)} L`;
    });
}

function renderBombas(lista) {
    const area = document.getElementById("areaBombas");
    if (!area) return;

    lista.forEach((b, i) => {
        const id = `bomba-${i}`;
        let el = document.getElementById(id);
        const ligada = b.estado === "ligada";
        const desconhecido = b.estado === "desconhecido";

        if (!el) {
            el = document.createElement("div");
            el.id = id;
            el.className = "card bomba";
            el.innerHTML = `<h2></h2><div class="status-icon"></div><div class="valor"></div><div class="ciclos"></div>`;
            area.appendChild(el);
        }

        el.className = `card bomba ${desconhecido? "stale" : ligada? "ligada" : "desligada"}`;
        el.querySelector("h2").innerText = b.nome;
        el.querySelector(".status-icon").innerText = desconhecido? "⚪" : ligada? "🟢" : "🔴";
        el.querySelector(".valor").innerText = desconhecido? "SEM DADOS" : ligada? "EM OPERAÇÃO" : "INATIVA";
        el.querySelector(".ciclos").innerText = `${b.ciclo?? 0} ciclos`;
    });
}

function renderPressoes(lista) {
    const area = document.getElementById("areaPressoes");
    if (!area) return;

    lista.forEach((p, i) => {
        const id = `pressao-${i}`;
        let el = document.getElementById(id);
        if (!el) {
            el = document.createElement("div");
            el.id = id;
            el.className = "card";
            el.innerHTML = `<h2></h2><div class="valor-pressao"></div>`;
            area.appendChild(el);
        }
        el.querySelector("h2").innerText = p.nome;
        el.querySelector(".valor-pressao").innerText = `${Number(p.pressao?? 0).toFixed(2)} bar`;
    });
}

async function carregarHistorico() {
    try {
        const res = await fetch("/historico", {
            cache: "no-store",
            headers: { "Authorization": "Basic " + btoa("118582:118582") }
        });
        const data = await res.json();
        renderHistoricoChart(data);
    } catch (e) {
        console.error("Erro histórico:", e);
    }
}

function renderHistoricoChart(data) {
    const ctx = document.getElementById("chartHistorico");
    if (!ctx) return;

    const cores = {
        elevador: '#60a5fa',
        osmose: '#22c55e',
        cme: '#facc15',
        abrandada: '#f97316',
        lavanderia: '#a855f7'
    };

    const datasets = Object.keys(data).map(setor => ({
        label: setor.charAt(0).toUpperCase() + setor.slice(1),
        data: data[setor] || [],
        borderWidth: 2,
        tension: 0.4,
        borderColor: cores[setor] || '#60a5fa',
        backgroundColor: cores[setor] || '#60a5fa',
        pointRadius: 2,
        pointHoverRadius: 5
    }));

    if (chartHistorico) chartHistorico.destroy();

    chartHistorico = new Chart(ctx, {
        type: 'line',
        data: { datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: {
                    type: 'time',
                    time: { unit: 'hour', displayFormats: { hour: 'HH:mm' } },
                    ticks: { color: '#94a3b8' },
                    grid: { color: 'rgba(148,163,184,0.1)' }
                },
                y: {
                    min: 0,
                    max: 100,
                    ticks: { color: '#94a3b8', callback: v => v + '%' },
                    grid: { color: 'rgba(148,163,184,0.1)' }
                }
            },
            plugins: {
                legend: { labels: { color: '#e2e8f0' } },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            return context.dataset.label + ': ' + context.parsed.y + '%';
                        }
                    }
                }
            }
        }
    });
}

function conectarWS() {
    if (ws) ws.close();
    const protocolo = location.protocol === "https:"? "wss:" : "ws:";
    ws = new WebSocket(`${protocolo}//${location.host}`);
    ws.onopen = () => { atualizarStatusVisual("Tempo real conectado"); };
    ws.onmessage = (msg) => { try { processarPayload(JSON.parse(msg.data)); } catch (e) { console.error("Erro WS:", e); } };
    ws.onclose = () => { atualizarStatusVisual("Reconectando..."); setTimeout(conectarWS, reconnectDelay); };
    ws.onerror = (err) => console.error("Erro WebSocket:", err);
}

async function fallbackHTTP() {
    try {
        const res = await fetch(API + "?t=" + Date.now(), {
            cache: "no-store",
            headers: { "Authorization": "Basic " + btoa("118582:118582") }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        processarPayload(data);
    } catch (err) {
        if (!ws || ws.readyState!== 1) {
            atualizarStatusVisual("Desconectado");
        }
    }
}

function atualizarStatusVisual(texto) {
    const el = document.getElementById("statusTexto");
    const dot = document.querySelector(".status-dot");
    if (!el ||!dot) return;

    el.innerText = texto;
    if (texto.includes("Tempo real")) {
        dot.style.background = "#00ff88";
    } else if (texto.includes("Reconectando")) {
        dot.style.background = "#ffd600";
    } else {
        dot.style.background = "#ff3d00";
    }
}

function formatar(n) {
    return Number(n || 0).toLocaleString("pt-BR");
}

function atualizarKPIs(data) {
    const elCritico = document.getElementById("kpiCritico");
    const elAtivas = document.getElementById("bombasAtivas");
    const elElevador = document.getElementById("kpiElevador");
    const elLavanderia = document.getElementById("kpiLavanderia");
    const elOsmose = document.getElementById("kpiOsmose");

    if (elCritico) {
        elCritico.innerText = (data.reservatorios || []).filter(r => r.percent < 30).length;
    }
    if (elAtivas) {
        elAtivas.innerText = (data.bombas || []).filter(b => b.estado === "ligada").length;
    }
    if (elElevador) {
        elElevador.innerText = `${formatar(data.kpis?.elevador_hoje || 0)} L`;
    }
    if (elLavanderia) {
        elLavanderia.innerText = `${formatar(data.kpis?.lavanderia_hoje || 0)} L`;
    }
    if (elOsmose) {
        elOsmose.innerText = `${formatar(data.kpis?.osmose_hoje || 0)} L`;
    }
}
</script>
