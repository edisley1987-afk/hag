<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAG SCADA - Dashboard Profissional</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ==========================================================
           CSS COMPLETO - ESTILO INDUSTRIAL DARK (GLASSMORPHISM)
           ========================================================== */
        :root {
            --bg-dark: #0f172a;
            --sidebar-bg: rgba(15, 23, 42, 0.98);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --neon-cyan: #00e5ff;
            --neon-blue: #0077ff;
            --neon-green: #00ff88;
            --text-white: #ffffff;
            --accent-red: #ff3d00;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- SIDEBAR RETRÁTIL --- */
        .sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: 70px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--glass-border);
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .sidebar:hover {
            width: 240px;
            box-shadow: 15px 0 40px rgba(0, 0, 0, 0.6);
        }

        .logo-area {
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            white-space: nowrap;
        }

        .sidebar ul { list-style: none; padding: 0; margin: 20px 0; flex: 1; }
        .sidebar ul li {
            padding: 18px 25px;
            display: flex;
            align-items: center; gap: 20px;
            cursor: pointer; white-space: nowrap; transition: 0.3s;
            color: rgba(255,255,255,0.6);
        }

        .sidebar ul li:hover, .sidebar ul li.active {
            color: var(--neon-cyan);
            background: rgba(255,255,255,0.05);
        }

        /* --- CONTEÚDO PRINCIPAL --- */
        .main-content {
            flex: 1;
            margin-left: 70px;
            padding: 40px;
            background: radial-gradient(circle at 70% 20%, #1e293b, #0f172a);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
        }

        .section-title {
            color: var(--neon-cyan);
            font-size: 14px;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* --- CARDS E TANQUES --- */
        .grid-reservatorios {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(5px);
            text-align: center;
        }

        .tanque {
            position: relative;
            width: 120px; height: 200px;
            margin: 15px auto;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(0, 229, 255, 0.2);
            border-radius: 60px;
            overflow: hidden;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        .agua {
            position: absolute; bottom: 0; width: 100%;
            background: linear-gradient(180deg, var(--neon-cyan) 0%, var(--neon-blue) 100%);
            box-shadow: 0 -8px 25px rgba(0, 229, 255, 0.6);
            transition: height 1.5s ease-in-out;
            border-radius: 0 0 60px 60px;
        }

        .label-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); z-index: 10;
        }

        .label-percent { font-size: 28px; font-weight: 900; }

        /* --- BOMBAS E PRESSÃO --- */
        .lower-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .bomba-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .pressao-col { display: flex; flex-direction: column; gap: 15px; }

        .pressao-item {
            display: flex; justify-content: space-between;
            align-items: center; padding: 15px 20px;
        }

        /* --- GRÁFICO --- */
        .chart-container { height: 250px; margin-top: 20px; }

    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo-area">
            <span style="font-size: 24px;">💧</span>
            <span style="font-weight: bold; font-size: 18px;">HAG SCADA</span>
        </div>
        <ul>
            <li class="active"><span>📊</span> <span>Dashboard</span></li>
            <li><span>📈</span> <span>Gráficos</span></li>
            <li><span>⚠️</span> <span>Alertas</span></li>
            <li><span>⚙️</span> <span>Configurações</span></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <div>
                <h1 style="margin:0">Monitoramento de Caixa d'Água</h1>
                <p>Hospital Arnaldo Gavazza | Unidade Industrial</p>
            </div>
            <div style="text-align: right;">
                <div id="relogio" style="font-size: 28px; font-weight: bold;">00:00:00</div>
                <div style="color: var(--neon-green); font-size: 11px; font-weight: bold;">● TEMPO REAL CONECTADO</div>
            </div>
        </header>

        <h3 class="section-title">Reservatórios</h3>
        <section id="areaReservatorios" class="grid-reservatorios"></section>

        <div class="lower-grid">
            <div>
                <h3 class="section-title">Estado das Bombas</h3>
                <div id="areaBombas" class="bomba-grid"></div>

                <h3 class="section-title" style="margin-top: 40px;">Histórico 24h</h3>
                <div class="card chart-container">
                    <canvas id="nivelChart"></canvas>
                </div>
            </div>

            <div>
                <h3 class="section-title">Sensores de Pressão</h3>
                <div id="areaPressao" class="pressao-col"></div>
            </div>
        </div>
    </main>

    <script>
        // --- DADOS DO SISTEMA ---
        const dados = {
            reservatorios: [
                { nome: "Elevador", percent: 83, litros: 16659 },
                { nome: "Osmose", percent: 94, litros: 188 },
                { nome: "Cme", percent: 100, litros: 1000 },
                { nome: "Abrandada", percent: 94, litros: 8423 },
                { nome: "Lavanderia", percent: 90, litros: 9033 }
            ],
            bombas: [
                { nome: "Bomba 01", status: "Inativa", cor: "var(--accent-red)", icon: "🛑", ciclos: 1 },
                { nome: "Bomba 02", status: "Ligada", cor: "var(--neon-green)", icon: "⚙️", ciclos: 0 },
                { nome: "Bomba Osmose", status: "Ligada", cor: "var(--neon-green)", icon: "⚙️", ciclos: 716 }
            ],
            pressao: [
                { nome: "Saída Osmose", valor: 3.67 },
                { nome: "Retorno Osmose", valor: 1.56 },
                { nome: "Saída CME", valor: 0.51 }
            ]
        };

        // --- RENDERIZAÇÃO DA INTERFACE ---
        function updateUI() {
            // Tanques
            document.getElementById('areaReservatorios').innerHTML = dados.reservatorios.map(r => `
                <div class="card">
                    <div style="font-size: 11px; opacity: 0.6; text-transform: uppercase;">${r.nome}</div>
                    <div class="tanque">
                        <div class="label-container">
                            <div class="label-percent">${r.percent}%</div>
                            <div style="font-size:10px; opacity:0.5">${r.litros} L</div>
                        </div>
                        <div class="agua" style="height: ${r.percent}%"></div>
                    </div>
                    <div style="font-size: 10px; color: var(--neon-green)">● NORMAL</div>
                </div>
            `).join('');

            // Bombas (3 Colunas)
            document.getElementById('areaBombas').innerHTML = dados.bombas.map(b => `
                <div class="card">
                    <div style="font-size: 28px; margin-bottom: 5px;">${b.icon}</div>
                    <div style="color: ${b.cor}; font-weight: bold; font-size: 12px;">${b.status}</div>
                    <div style="font-size: 10px; opacity: 0.5;">${b.nome}</div>
                    <div style="margin-top: 10px; font-size: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 5px;">
                        ${b.ciclos} ciclos hoje
                    </div>
                </div>
            `).join('');

            // Pressão
            document.getElementById('areaPressao').innerHTML = dados.pressao.map(p => `
                <div class="card pressao-item">
                    <span style="font-size: 12px; opacity: 0.7;">${p.nome}</span>
                    <span style="color: var(--neon-cyan); font-weight: bold;">${p.valor} bar</span>
                </div>
            `).join('');
        }

        // --- RELÓGIO E GRÁFICO ---
        setInterval(() => {
            document.getElementById('relogio').textContent = new Date().toLocaleTimeString();
        }, 1000);

        function initChart() {
            const ctx = document.getElementById('nivelChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['10h', '12h', '14h', '16h', '18h', '20h', '22h', '00h'],
                    datasets: [{
                        label: 'Nível %',
                        data: [70, 75, 85, 90, 88, 82, 78, 83],
                        borderColor: '#00e5ff',
                        backgroundColor: 'rgba(0, 229, 255, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: false },
                        x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.3)' } }
                    }
                }
            });
        }

        // Inicialização
        updateUI();
        initChart();
    </script>
</body>
</html>
