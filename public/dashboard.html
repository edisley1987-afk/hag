<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoramento Hospital Arnaldo Gavazza</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
    /* Estilos originais que você enviou */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        color: #e2e8f0;
        padding: 20px;
        min-height: 100vh;
    }
    .header {
        display: flex; justify-content: space-between; align-items: center;
        margin-bottom: 30px; padding: 20px; background: rgba(30, 41, 59, 0.8);
        border-radius: 12px; border: 1px solid rgba(148, 163, 184, 0.2);
    }
    .header h1 { font-size: 24px; color: #60a5fa; }
    .status { display: flex; align-items: center; gap: 10px; font-size: 14px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #00ff88; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
    .kpi-card {
        background: rgba(30, 41, 59, 0.8); padding: 15px; border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.2); text-align: center;
    }
    .kpi-card h3 { font-size: 12px; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; }
    .kpi-card .value { font-size: 28px; font-weight: bold; color: #60a5fa; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .card {
        background: rgba(30, 41, 59, 0.8); padding: 20px; border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.2); transition: all 0.3s;
    }
    .card:hover { border-color: #60a5fa; box-shadow: 0 8px 20px rgba(96, 165, 250, 0.2); }
    .card h2 { font-size: 16px; margin-bottom: 15px; color: #cbd5e1; }

    .tanque {
        position: relative; width: 100%; height: 200px; background: rgba(15, 23, 42, 0.6);
        border-radius: 8px; overflow: hidden; border: 2px solid #334155; margin-bottom: 15px;
    }
    .escala {
        position: absolute; right: 5px; top: 0; height: 100%; display: flex; flex-direction: column;
        justify-content: space-between; padding: 10px 0; font-size: 10px; color: #64748b; z-index: 2;
    }
    .agua {
        position: absolute; bottom: 0; width: 100%; height: 0%;
        background: linear-gradient(180deg, #3b82f6 0%, #1e40af 100%);
        transition: height 1.2s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1;
    }
    /* Cores dinâmicas */
    .nivel-alto { background: linear-gradient(180deg, #60a5fa 0%, #2563eb 100%); }
    .nivel-baixo { background: linear-gradient(180deg, #f97316 0%, #ea580c 100%); }
    .nivel-critico { background: linear-gradient(180deg, #ef4444 0%, #dc2626 100%); }

    .onda {
        position: absolute; top: -10px; width: 200%; height: 20px;
        background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.3) 0%, transparent 50%);
        animation: wave 3s infinite linear; opacity: 0.5;
    }
    @keyframes wave { 0% { transform: translateX(-50%); } 100% { transform: translateX(0%); } }

    .info { display: flex; justify-content: space-between; align-items: center; }
    .valor { font-size: 32px; font-weight: bold; }
    .litros { font-size: 14px; color: #94a3b8; }
    .card.alerta { border-color: #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }

    .status-icon { font-size: 40px; text-align: center; margin: 10px 0; }
    .valor-pressao { font-size: 28px; font-weight: bold; color: #60a5fa; text-align: center; margin: 20px 0; }
    
    .chart-container { background: rgba(30, 41, 59, 0.8); padding: 20px; border-radius: 12px; border: 1px solid rgba(148, 163, 184, 0.2); }
    canvas { max-height: 300px; }
</style>
</head>
<body>
  <div class="header">
    <h1>🏥 Monitoramento HAG</h1>
    <div class="status">
      <div class="status-dot" id="dot"></div>
      <span id="statusTexto">Conectando...</span>
      <span id="hora">--:--</span>
    </div>
  </div>

  <div class="kpis">
    <div class="kpi-card"><h3>Reservatórios Baixos</h3><div class="value" id="kpiCritico">0</div></div>
    <div class="kpi-card"><h3>Bombas Ativas</h3><div class="value" id="bombasAtivas">0</div></div>
    <div class="kpi-card"><h3>Data Servidor</h3><div class="value" id="kpiData" style="font-size: 16px;">--/--</div></div>
  </div>

  <div class="grid" id="areaReservatorios"></div>
  <div class="grid" id="areaBombas"></div>
  <div class="grid" id="areaPressoes"></div>

  <div class="chart-container">
    <h2>Histórico de Níveis (%)</h2>
    <canvas id="chartHistorico"></canvas>
  </div>

<script>
// CONFIGURAÇÃO DO SERVIDOR
const serverUrl = window.location.hostname === "localhost" 
    ? "ws://localhost:3000" 
    : "wss://hag-9ki9.onrender.com"; // Ajustado para seu link do Render

let socket;
let chartHistorico = null;

function conectarWS() {
    socket = new WebSocket(serverUrl);

    socket.onopen = () => {
        atualizarStatusVisual("Tempo real conectado", "#00ff88");
    };

    socket.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === "update") {
            atualizarUI(msg.dados);
        }
    };

    socket.onclose = () => {
        atualizarStatusVisual("Reconectando...", "#ffd600");
        setTimeout(conectarWS, 5000);
    };
}

function atualizarUI(data) {
    if (!data) return;

    // 1. Hora e Data
    document.getElementById("hora").innerText = new Date().toLocaleTimeString();
    document.getElementById("kpiData").innerText = data.lastUpdate || "";

    // 2. Renderizar Reservatórios
    const areaRes = document.getElementById("areaReservatorios");
    areaRes.innerHTML = data.reservatorios.map(r => {
        let corClasse = "nivel-alto";
        if (r.percent < 20) corClasse = "nivel-critico";
        else if (r.percent < 40) corClasse = "nivel-baixo";

        return `
            <div class="card ${r.percent < 20 ? 'alerta' : ''}">
                <h2>${r.nome}</h2>
                <div class="tanque">
                    <div class="escala"><span>100</span><span>75</span><span>50</span><span>25</span><span>0</span></div>
                    <div class="agua ${corClasse}" style="height: ${r.percent}%">
                        <div class="onda"></div>
                    </div>
                </div>
                <div class="info">
                    <div class="valor">${r.percent}%</div>
                    <div class="litros">${r.current_liters.toLocaleString()} L</div>
                </div>
            </div>
        `;
    }).join('');

    // 3. Renderizar Bombas
    const areaBombas = document.getElementById("areaBombas");
    areaBombas.innerHTML = data.bombas.map(b => `
        <div class="card">
            <h2>${b.nome}</h2>
            <div class="status-icon">${b.estado === "ligada" ? "🟢" : "🔴"}</div>
            <div style="text-align:center; font-weight:bold; color:${b.estado === "ligada" ? "#22c55e" : "#ef4444"}">
                ${b.estado.toUpperCase()}
            </div>
            <div style="font-size:12px; color:#94a3b8; text-align:center; margin-top:5px;">
                ${b.ciclo || 0} ciclos hoje
            </div>
        </div>
    `).join('');

    // 4. Renderizar Pressões
    const areaPressoes = document.getElementById("areaPressoes");
    areaPressoes.innerHTML = data.pressoes.map(p => `
        <div class="card">
            <h2>${p.nome}</h2>
            <div class="valor-pressao">${p.pressao ? p.pressao.toFixed(2) : "0.00"} bar</div>
        </div>
    `).join('');

    // 5. KPIs
    document.getElementById("kpiCritico").innerText = data.reservatorios.filter(r => r.percent < 30).length;
    document.getElementById("bombasAtivas").innerText = data.bombas.filter(b => b.estado === "ligada").length;
}

function atualizarStatusVisual(texto, cor) {
    document.getElementById("statusTexto").innerText = texto;
    document.getElementById("dot").style.background = cor;
}

// Iniciar gráfico simples
function initChart() {
    const ctx = document.getElementById('chartHistorico').getContext('2d');
    chartHistorico = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['10:00', '11:00', '12:00', '13:00', '14:00', '15:00'],
            datasets: [{
                label: 'Nível Médio %',
                data: [85, 82, 70, 65, 90, 88],
                borderColor: '#60a5fa',
                tension: 0.4,
                fill: true,
                backgroundColor: 'rgba(96, 165, 250, 0.1)'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { y: { min: 0, max: 100 } }
        }
    });
}

window.onload = () => {
    conectarWS();
    initChart();
};
</script>
</body>
</html>
