<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoramento HAG</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<header>

<!-- TOPO -->

<div class="header-top">

<h1>💧 Monitoramento HAG</h1>

<a href="historico.html" class="btn-historico">
📊 Histórico
</a>

</div>


<!-- STATUS -->

<div id="statusSistema">
🟢 Tempo real conectado
</div>


<!-- DATA E HORA -->

<div class="header-info">

<div>
📅 <span id="dataSistema"></span>
</div>

<div>
⏰ <span id="hora">--:--</span>
</div>

</div>


<!-- KPIs -->

<div class="kpis">

<div class="kpi">
Elevador Hoje
<span id="kpiElevador">0 L</span>
</div>

<div class="kpi">
Lavanderia Hoje
<span id="kpiLavanderia">0 L</span>
</div>

<div class="kpi">
Osmose Hoje
<span id="kpiOsmose">0 L</span>
</div>

<div class="kpi">
Bombas Ativas
<span id="kpiBombas">0</span>
</div>

<div class="kpi">
Reservatórios Críticos
<span id="kpiCritico">0</span>
</div>

</div>

</header>


<main>

<!-- =========================
RESERVATÓRIOS
========================= -->

<section>

<h2 class="titulo-area">
Reservatórios
</h2>

<div id="areaReservatorios" class="grid-reservatorios">
<!-- JS PREENCHE -->
</div>

</section>



<!-- =========================
BOMBAS
========================= -->

<section>

<h2 class="titulo-area">
Bombas
</h2>

<div id="areaBombas" class="grid-bombas">
<!-- JS PREENCHE -->
</div>

</section>



<!-- =========================
PRESSÕES
========================= -->

<section>

<h2 class="titulo-area">
Pressões
</h2>

<div id="areaPressoes" class="grid-pressoes">
<!-- JS PREENCHE -->
</div>

</section>

</main>



<footer>
Sistema Profissional - HAG
</footer>



<!-- =========================
⏰ RELÓGIO + DATA
========================= -->

<script>

document.addEventListener("DOMContentLoaded", () => {

function atualizarHora(){

const agora = new Date()

const hora = document.getElementById("hora")
const data = document.getElementById("dataSistema")

if(hora){
hora.innerText = agora.toLocaleTimeString("pt-BR")
}

if(data){
data.innerText = agora.toLocaleDateString("pt-BR")
}

}

atualizarHora()
setInterval(atualizarHora,1000)

})

</script>



<!-- =========================
📡 DASHBOARD
========================= -->

<script src="dashboard.js"></script>

</body>
</html>
