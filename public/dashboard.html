<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAG SCADA V6.1 - Industrial</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ==========================================================
           CSS INDUSTRIAL DARK - HAG SCADA
           ========================================================== */
        :root {
            --bg-dark: #0f172a;
            --sidebar-bg: rgba(15, 23, 42, 0.98);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --neon-cyan: #00e5ff;
            --neon-blue: #0077ff;
            --neon-green: #00ff88;
            --accent-red: #ff3d00;
            --text-white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: 70px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--glass-border);
            transition: width 0.3s ease;
            z-index: 1000;
            overflow: hidden;
        }

        .sidebar:hover { width: 240px; }

        .logo-area {
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            font-weight: bold;
        }

        .sidebar ul { list-style: none; margin-top: 20px; }
        .sidebar ul li {
            padding: 18px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: 0.3s;
            color: rgba(255,255,255,0.6);
            white-space: nowrap;
        }

        .sidebar ul li:hover {
            color: var(--neon-cyan);
            background: rgba(255,255,255,0.05);
        }

        /* CONTEÚDO */
        .main-content {
            flex: 1;
            margin-left: 70px;
            padding: 40px;
            background: radial-gradient(circle at 70% 20%, #1e293b, #0f172a);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
        }

        .section-title {
            color: var(--neon-cyan);
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        /* GRID E CARDS */
        .grid-reservatorios {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--neon-cyan); }

        /* ANIMAÇÃO DE ALERTA */
        .alerta-critico {
            border-color: var(--accent-red) !important;
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 61, 0, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 61, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 61, 0, 0); }
        }

        /* TANQUES */
        .tanque {
            position: relative;
            width: 110px; height: 180px;
            margin: 15px auto;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            overflow: hidden;
        }

        .agua {
            position: absolute; bottom: 0; width: 100%;
            background: linear-gradient(180deg, var(--neon-cyan) 0%, var(--neon-blue) 100%);
            transition: height 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -5px 15px var(--neon-cyan);
        }

        .label-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .label-percent { font-size: 24px; font-weight: 800; }

        /* INFERIOR */
        .lower-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .bomba-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .pressao-col { display: flex; flex-direction: column; gap: 15px; }

        .pressao-item {
            display: flex; justify-content: space-between;
            align-items: center; padding: 15px 20px;
        }

        .chart-container { height: 260px; margin-top: 20px; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo-area"><span>💧</span><span>HAG SCADA</span></div>
        <ul>
            <li><span>📊</span> Dashboard</li>
            <li><span>📈</span> Histórico</li>
            <li><span>⚠️</span> Alertas</li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <div>
                <h1 style="font-size: 24px;">Monitoramento Hospitalar</h1>
                <p style="opacity: 0.6; font-size: 14px;">Servidor: <span id="data-display">Conectando...</span></p>
            </div>
            <div style="text-align: right;">
                <div id="relogio" style="font-size: 24px; font-weight: bold; font-family: monospace;">00:00:00</div>
                <div style="color: var(--neon-green); font-size: 11px; font-weight: bold; margin-top: 5px;">
                    ● STATUS DO SERVIDOR
                </div>
            </div>
        </header>

        <h3 class="section-title">Níveis dos Reservatórios</h3>
        <section id="areaReservatorios" class="grid-reservatorios">
            </section>

        <div class="lower-grid">
            <div>
                <h3 class="section-title">Status das Bombas</h3>
                <div id="areaBombas" class="bomba-grid">
                    </div>

                <h3 class="section-title" style="margin-top: 35px;">Tendência de Nível (24h)</h3>
                <div class="card chart-container">
                    <canvas id="nivelChart"></canvas>
                </div>
            </div>

            <div>
                <h3 class="section-title">Sensores de Pressão</h3>
                <div id="areaPressao" class="pressao-col">
                    </div>
            </div>
        </div>
    </main>

    <script>
        /* ==========================================================
           LOGICA DE CONEXÃO WEBSOCKET - HAG V6.1
           ========================================================== */
        
        let socket;
        const serverUrl = window.location.hostname === "localhost" 
            ? "ws://localhost:3000" 
            : "wss://seu-app-no-render.onrender.com"; // <-- ALTERE PARA SUA URL DO RENDER

        function conectarWS() {
            socket = new WebSocket(serverUrl);

            socket.onopen = () => {
                console.log("✅ Conectado ao HAG SCADA Server");
                const statusLabel = document.querySelector('.top-bar div[style*="color: var(--neon-green)"]');
                if(statusLabel) statusLabel.innerHTML = "● ONLINE (REAL-TIME)";
            };

            socket.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === "update") {
                    renderizarDadosReais(msg.dados);
                }
            };

            socket.onclose = () => {
                console.log("❌ Conexão perdida. Tentando reconectar...");
                const statusLabel = document.querySelector('.top-bar div[style*="color: var(--neon-green)"]');
                if(statusLabel) {
                    statusLabel.innerHTML = "● OFFLINE (RECONECTANDO)";
                    statusLabel.style.color = "var(--accent-red)";
                }
                setTimeout(conectarWS, 5000);
            };
        }

        function renderizarDadosReais(dados) {
            // 1. Atualizar Data e Hora do Servidor
            const display = document.getElementById('data-display');
            if(display) display.textContent = dados.lastUpdate;

            // 2. Reservatórios
            document.getElementById('areaReservatorios').innerHTML = dados.reservatorios.map(r => `
                <div class="card ${r.percent < 20 ? 'alerta-critico' : ''}">
                    <div style="font-size: 11px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px;">${r.nome}</div>
                    <div class="tanque">
                        <div class="label-container">
                            <div class="label-percent">${r.percent}%</div>
                            <div style="font-size:10px; opacity:0.7">${r.current_liters.toLocaleString()} L</div>
                        </div>
                        <div class="agua" style="height: ${r.percent}%"></div>
                    </div>
                    <div style="font-size: 10px; font-weight: bold; color: ${r.percent < 20 ? 'var(--accent-red)' : 'var(--neon-green)'}">
                        ● ${r.percent < 20 ? 'NÍVEL CRÍTICO' : 'OPERACIONAL'}
                    </div>
                </div>
            `).join('');

            // 3. Bombas
            document.getElementById('areaBombas').innerHTML = dados.bombas.map(b => {
                const estaLigada = b.estado === "ligada";
                return `
                    <div class="card">
                        <div style="font-size: 24px; margin-bottom: 8px;">${estaLigada ? '⚙️' : '🛑'}</div>
                        <div style="color: ${estaLigada ? 'var(--neon-green)' : 'var(--accent-red)'}; font-weight: bold; font-size: 11px; text-transform: uppercase;">
                            ${b.estado}
                        </div>
                        <div style="font-size: 12px; margin: 4px 0;">${b.nome}</div>
                        <div style="margin-top: 8px; font-size: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 5px; opacity: 0.6;">
                            ${b.ciclo} ciclos hoje
                        </div>
                    </div>
                `;
            }).join('');

            // 4. Pressões
            document.getElementById('areaPressao').innerHTML = dados.pressoes.map(p => `
                <div class="card pressao-item">
                    <span style="font-size: 12px; opacity: 0.7;">${p.nome}</span>
                    <span style="color: var(--neon-cyan); font-weight: bold; font-family: monospace;">
                        ${p.pressao !== null ? p.pressao.toFixed(2) : '--'} BAR
                    </span>
                </div>
            `).join('');
        }

        // Relógio local
        setInterval(() => {
            document.getElementById('relogio').textContent = new Date().toLocaleTimeString();
        }, 1000);

        // Gráfico (Placeholder - pode ser integrado com o endpoint /historico depois)
        function initChart() {
            const ctx = document.getElementById('nivelChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['00h', '04h', '08h', '12h', '16h', '20h'],
                    datasets: [{
                        label: 'Nível Geral %',
                        data: [80, 75, 60, 90, 85, 83],
                        borderColor: '#00e5ff',
                        borderWidth: 2,
                        backgroundColor: 'rgba(0, 229, 255, 0.05)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: false },
                        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } }
                    }
                }
            });
        }

        window.onload = () => {
            conectarWS();
            initChart();
        };
    </script>
</body>
</html>
