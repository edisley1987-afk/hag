<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoramento HAG</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ========================= HEADER ========================= -->
<header class="header">

  <div class="header-left">
    <h1>💧 Monitoramento HAG</h1>
    <span class="subtitulo">Sistema de Reservatórios</span>
  </div>

  <div class="header-center">
    <span class="status-online">🟢 Online</span>
    <span id="hora">--:--</span>
  </div>

  <div class="header-right">
    <span>⚙️ Bombas: <b id="bombasAtivas">0</b></span>
    <span>🚨 Críticos: <b id="kpiCritico">0</b></span>
    <a href="historico.html" class="btn-historico">📊</a>
  </div>

</header>

<!-- ========================= KPIs ========================= -->
<section class="kpis">

  <div class="kpi">
    Elevador Hoje
    <span id="kpiElevador">0 L</span>
  </div>

  <div class="kpi">
    Lavanderia Hoje
    <span id="kpiLavanderia">0 L</span>
  </div>

  <div class="kpi">
    Osmose Hoje
    <span id="kpiOsmose">0 L</span>
  </div>

</section>

<main>

<!-- ========================= RESERVATÓRIOS ========================= -->
<section>
  <h2 class="titulo-area">Reservatórios</h2>

  <div id="areaReservatorios" class="grid-reservatorios">
    <!-- JS monta assim: -->
    <!--
    <div class="tank-card">
      <div class="tank">
        <div class="water" style="--level: 75%"></div>

        <div class="tank-label">
          <h3>Elevador</h3>
          <span>75%</span>
          <small>15.000 L</small>
        </div>
      </div>
    </div>
    -->
  </div>
</section>

<!-- ========================= BOMBAS ========================= -->
<section>
  <h2 class="titulo-area">Bombas</h2>
  <div id="areaBombas" class="grid-bombas"></div>
</section>

<!-- ========================= PRESSÕES ========================= -->
<section>
  <h2 class="titulo-area">Pressões</h2>
  <div id="areaPressoes" class="grid-pressoes"></div>
</section>

</main>

<footer>
Sistema Profissional - HAG
</footer>

<script src="/dashboard.js"></script>

</body>
</html>
